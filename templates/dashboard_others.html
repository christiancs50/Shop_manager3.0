<!DOCTYPE html>
<html>
<head>
    <title>Cashier Dashboard</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; height: 100vh; background: #f4f7f6; }
        .sidebar { width: 250px; background: #2c3e50; color: white; padding: 20px; }
        .main { flex: 1; padding: 40px; }
        .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 15px; }
        .product-card { background: white; padding: 15px; border-radius: 8px; text-align: center; cursor: pointer; border: 1px solid #ddd; }
        .product-card:hover { border-color: #27ae60; }
    </style>
</head>
<body>
    <div class="sidebar">
        <h3>POS - CASHIER</h3>
        <p>Logged in as: {{ user }}</p>
        <hr>
        <a href="/inventory" style="color:white; text-decoration: none;"><p>📦 View Stock</p></a>
        <a href="/logout" style="color:#ff7675; text-decoration: none;"><p>Logout</p></a>
    </div>
    <div class="main">
        <h1>Welcome to the Shop</h1>
        <div class="product-grid">
            {% for p in products %}
            <div class="product-card">
                <h3>{{ p.name }}</h3>
                <p>Price: {{ p.sell_price }}</p>
                <p>Stock: {{ p.quantity }}</p>
            </div>
            {% endfor %}
        </div>
    </div>
</body>
</html>

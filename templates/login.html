<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>POS Login</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: #2c3e50; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
        }
        .login-box { 
            background: white; 
            padding: 40px; 
            border-radius: 12px; 
            width: 350px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.3); 
        }
        h2 { text-align: center; color: #2c3e50; margin-bottom: 25px; }
        input { 
            width: 100%; 
            padding: 14px; 
            margin: 10px 0; 
            box-sizing: border-box; 
            border: 1px solid #dfe6e9; 
            border-radius: 6px; 
            font-size: 16px;
        }
        button { 
            width: 100%; 
            padding: 14px; 
            margin-top: 15px; 
            background: #3498db; 
            color: white; 
            border: none; 
            border-radius: 6px; 
            font-weight: bold; 
            font-size: 16px; 
            cursor: pointer; 
            transition: background 0.3s;
        }
        button:hover { background: #2980b9; }
        .error-msg { 
            color: #e74c3c; 
            font-size: 0.9em; 
            text-align: center; 
            margin-top: 15px; 
            padding: 10px;
            background: #fadbd8;
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <div class="login-box">
        <h2>POS System</h2>
        
        <form action="{{ url_for('login') }}" method="POST">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            
            <input type="text" name="username" placeholder="Username" required autocomplete="username">
            <input type="password" name="password" placeholder="Password" required autocomplete="current-password">
            <button type="submit">SIGN IN</button>
        </form>

        {% with messages = get_flashed_messages() %}
            {% if messages %}
                <div class="error-msg">
                    {{ messages[0] }}
                </div>
            {% endif %}
        {% endwith %}
    </div>
</body>
</html>

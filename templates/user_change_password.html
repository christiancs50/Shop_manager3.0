<!DOCTYPE html>
<html>
<head>
    <title>Change Password</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; display: flex; justify-content: center; padding-top: 50px; }
        .card { background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 350px; }
        input, button { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; }
        button { background: #34495e; color: white; border: none; font-weight: bold; cursor: pointer; }
        button:hover { background: #2c3e50; }
        .back-link { display: block; text-align: center; color: #7f8c8d; text-decoration: none; margin-top: 15px; }
    </style>
</head>
<body>
    <div class="card">
        <h2 style="text-align: center;">Security Settings</h2>
        <form method="POST">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            
            <input type="password" name="old_password" placeholder="Current Password" required>
            <input type="password" name="new_password" placeholder="New Password" required minlength="6">
            <input type="password" name="confirm_password" placeholder="Confirm New Password" required minlength="6">
            <button type="submit">UPDATE PASSWORD</button>
        </form>
        
        {% with messages = get_flashed_messages() %}
            {% if messages %}
                <div style="text-align: center; padding: 10px; margin-bottom: 10px; border-radius: 4px; 
                    {{ 'background: #d4efdf; color: #27ae60;' if 'successfully' in messages[0] else 'background: #fadbd8; color: #e74c3c;' }}">
                    {{ messages[0] }}
                </div
            {% endif %}
        {% endwith %}
        
        <a href="/dashboard" class="back-link">← Cancel</a>
    </div>
</body>
</html>

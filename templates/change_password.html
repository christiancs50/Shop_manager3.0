<!DOCTYPE html>
<html>
<head>
    <title>Setup Password</title>
    <style>
        body { font-family: sans-serif; background: #2c3e50; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .box { background: white; color: #333; padding: 30px; border-radius: 10px; width: 350px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        h2 { margin-top: 0; color: #2c3e50; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #27ae60; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .msg { color: red; font-size: 0.8em; margin-bottom: 10px; }
    </style>
</head>
<body>
    <div class="box">
        <h2>Security Setup</h2>
        <p>Please change your password to continue.</p>

        {% with messages = get_flashed_messages() %}
            {% if messages %}<div class="msg">{{ messages[0] }}</div>{% endif %}
        {% endwith %}

        <form method="POST">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <input type="password" name="old_password" placeholder="Current Password (admin123)" required>
            <input type="password" name="new_password" placeholder="New Password" required>
            <input type="password" name="confirm_password" placeholder="Confirm New Password" required>
            <button type="submit">FINISH & LOGIN</button>
        </form>
    </div>
</body>
</html>
